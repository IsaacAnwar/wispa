# wispa configuration

# Push-to-talk key: "fn" | "right_option" | "ctrl_option"
hotkey = "fn"

# Ignore recordings shorter than this (accidental taps), in seconds
min_duration = 0.3

[asr]
model = "mlx-community/parakeet-tdt-0.6b-v3"

[cleanup]
# Set to false to always inject the raw transcript
enabled = true
# Any model you've pulled in Ollama. Use an instruct-only (non-thinking) model —
# thinking models burn seconds of latency on chain-of-thought before answering.
model = "qwen3:4b-instruct"
# If Ollama doesn't answer within this many seconds, fall back to the raw transcript
timeout = 6.0
# Skip the LLM when the transcript has no filler/self-correction cues (0ms path).
# Set to false if dictionary repair matters more than speed on clean sentences.
skip_when_clean = true

[dictionary]
# Domain terms the cleanup model should spell correctly and repair
# mis-transcriptions toward ("laura adapters" -> "LoRA adapters")
terms = [
    "LoRA", "PEFT", "RLHF", "SFT", "ASR", "LLM", "MLX", "GGUF",
    "logits", "softmax", "tokenizer", "embeddings", "transformer",
    "fine-tuning", "quantization", "inference", "attention", "KV cache",
    "agentic", "guardrails", "RAG", "prompt engineering", "few-shot",
    "Ollama", "qwen", "PyTorch", "Hugging Face", "GRPO", "PPO",
    "Alinia"
]

[injection]
# "ax" tries direct insertion via the Accessibility API, falling back to paste.
# "paste" always uses clipboard + Cmd+V.
method = "ax"
restore_clipboard = true
